# Final UART map for the standard LD2450 hardware.
# Keep this package after the central LD2450 package so both radar buses are
# present in the merged ESP32-C6 configuration.

uart:
  - id: uart_ld2412
    tx_pin: GPIO21
    rx_pin: GPIO20
    baud_rate: 115200
    parity: NONE
    stop_bits: 1
  - id: uart_ld2450
    tx_pin: GPIO18
    rx_pin: GPIO19
    baud_rate: 256000
    parity: NONE
    stop_bits: 1
    rx_buffer_size: 1024
