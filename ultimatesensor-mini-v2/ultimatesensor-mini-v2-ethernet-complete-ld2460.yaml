# UltimateSensor Mini V2 Ethernet Complete LD2460 Upgrade Configuration
# Use only when the standard LD2450 module has been replaced by the optional LD2460 upgrade.

substitutions:
  device_name: ultimatesensor-mini-v2
  friendly_name: "UltimateSensor Mini V2"
  ultimatesensor_mini_hardware_version: "V2-Complete-LD2460"
  ultimatesensor_mini_connection_type: "Ethernet"
  wifi_fast_connect: "false"

packages:
  base: !include base.yaml
  tracking: !include tracking-ld2460.yaml
  net: !include ethernet.yaml
  variant: !include complete.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/ultimatesensor-mini/ultimatesensor-mini-v2/ultimatesensor-mini-v2-ethernet-complete-ld2460.yaml@main
  import_full_config: false
