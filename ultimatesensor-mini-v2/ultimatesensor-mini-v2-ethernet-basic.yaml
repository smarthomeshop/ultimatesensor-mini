# UltimateSensor Mini V2 Ethernet Basic Configuration
# This configuration excludes the SPS30 particulate matter sensor.
# Use this file if your device does not include the PM/fine dust sensor and uses Ethernet.

substitutions:
  device_name: ultimatesensor-mini-v2
  friendly_name: "UltimateSensor Mini V2"
  ultimatesensor_mini_hardware_version: "V2-Basic"
  ultimatesensor_mini_connection_type: "Ethernet"
  wifi_fast_connect: "false"
  default_network: "Ethernet Basic (local)"
  tracking_suffix: ""
  update_manifest_url: "https://smarthomeshop.github.io/ultimatesensor-mini/ultimatesensor-mini-v2-ethernet-basic-manifest.json"

packages:
  base: !include base.yaml
  tracking: !include tracking-ld2450.yaml
  buses: !include buses-ld2450.yaml
  net: !include ethernet.yaml
  firmware: !include firmware-selector.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/ultimatesensor-mini/ultimatesensor-mini-v2/ultimatesensor-mini-v2-ethernet-basic.yaml@main
  import_full_config: false
