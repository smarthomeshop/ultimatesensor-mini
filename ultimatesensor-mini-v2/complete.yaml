# Complete variant configuration.
# Adds the SPS30 particulate matter sensor and PM idle controls.

esphome:
  on_boot:
    - priority: -100
      then:
        - if:
            condition:
              switch.is_on: pm_sensor_switch
            then:
              - script.execute: sps30_idle_cycle

sensor:
  - platform: sps30
    id: sps30_sensor
    pm_1_0:
      id: PM_1_0
      name: "PM <1um Weight concentration"
      web_server:
        sorting_group_id: sorting_group_air_quality
        sorting_weight: 10
    pm_2_5:
      id: PM_2_5
      name: "PM <2.5um Weight concentration"
      web_server:
        sorting_group_id: sorting_group_air_quality
        sorting_weight: 11
    pm_4_0:
      id: PM_4_0
      name: "PM <4um Weight concentration"
      web_server:
        sorting_group_id: sorting_group_air_quality
        sorting_weight: 12
    pm_10_0:
      id: PM_10_0
      name: "PM <10um Weight concentration"
      web_server:
        sorting_group_id: sorting_group_air_quality
        sorting_weight: 13
    pmc_0_5:
      id: PMC_0_5
      name: "PM <0.5um Number concentration"
      web_server:
        sorting_group_id: sorting_group_air_quality
        sorting_weight: 14
    pmc_1_0:
      id: PMC_1_0
      name: "PM <1um Number concentration"
      web_server:
        sorting_group_id: sorting_group_air_quality
        sorting_weight: 15
    pmc_2_5:
      id: PMC_2_5
      name: "PM <2.5um Number concentration"
      web_server:
        sorting_group_id: sorting_group_air_quality
        sorting_weight: 16
    pmc_4_0:
      id: PMC_4_0
      name: "PM <4um Number concentration"
      web_server:
        sorting_group_id: sorting_group_air_quality
        sorting_weight: 17
    pmc_10_0:
      id: PMC_10_0
      name: "PM <10um Number concentration"
    pm_size:
      id: pm_size
      name: "Typical Particle size"
    address: 0x69
    update_interval: 60s

script:
  - id: sps30_idle_cycle
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(pm_sensor_switch).state && id(sps30_idle_interval).state <= 0;'
          then:
            - sps30.start_measurement: sps30_sensor
          else:
            - while:
                condition:
                  lambda: 'return id(pm_sensor_switch).state && id(sps30_idle_interval).state > 0;'
                then:
                  - sps30.start_measurement: sps30_sensor
                  - delay: !lambda |-
                      return (uint32_t)(30000 + id(sps30_update_interval).state * 2000);
                  - sps30.stop_measurement: sps30_sensor
                  - delay: !lambda |-
                      return (uint32_t)(id(sps30_idle_interval).state * 60000);

number:
  - platform: template
    name: "SPS30 Update Interval"
    id: sps30_update_interval
    min_value: 10
    max_value: 300
    step: 10
    initial_value: 60
    unit_of_measurement: "s"
    icon: mdi:update
    entity_category: config
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            id(sps30_sensor).set_update_interval((uint32_t)(x * 1000));

  - platform: template
    name: "SPS30 Idle Interval"
    id: sps30_idle_interval
    min_value: 0
    max_value: 30
    step: 1
    initial_value: 5
    unit_of_measurement: "min"
    icon: mdi:sleep
    entity_category: config
    optimistic: true
    restore_value: true
    on_value:
      then:
        - script.execute: sps30_idle_cycle

switch:
  - platform: template
    name: "PM Sensor"
    id: pm_sensor_switch
    icon: "mdi:air-filter"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    turn_on_action:
      - script.execute: sps30_idle_cycle
    turn_off_action:
      - script.stop: sps30_idle_cycle
      - sps30.stop_measurement: sps30_sensor
