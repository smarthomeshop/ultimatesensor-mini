# Standard UltimateSensor Mini V2 LD2450 tracking and Room Designer package.
# Factory hardware ships with LD2450 on GPIO18/GPIO19.

substitutions:
  ld2450_uart_tx_pin: GPIO18
  ld2450_uart_rx_pin: GPIO19
  ld2450_count_name_prefix: "Tracking "
  ld2450_target_name_prefix: "Tracking "
  ld2450_zone_name_prefix: "Tracking "
  ld2450_hardware_name_prefix: "Tracking "

packages:
  ld2450:
    url: https://github.com/smarthomeshop/ld2450
    ref: main
    files:
      - packages/ld2450-base.yaml
      - packages/ld2450-polygon-zones.yaml
    refresh: 1d

# The shared LD2450 package already defines the radar component and the
# stable tracking_presence entity used by the Mini occupancy combiner.
