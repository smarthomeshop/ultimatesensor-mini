# UltimateSensor Mini V2 Ethernet network package.
# W5500 power is enabled through the board MOSFET before Ethernet starts.

switch:
  - platform: gpio
    id: eth_power
    pin:
      number: GPIO2
      inverted: true
    restore_mode: ALWAYS_ON
    internal: true

ethernet:
  type: W5500
  clk_pin: GPIO1
  mosi_pin: GPIO11
  miso_pin: GPIO10
  cs_pin: GPIO0
  interrupt_pin: GPIO12
  reset_pin: GPIO13

text_sensor:
  - platform: ethernet_info
    ip_address:
      id: ethernet_ip_address
      name: "Ethernet IP Address"
      entity_category: diagnostic
    dns_address:
      name: "Ethernet DNS Address"
      entity_category: diagnostic
    mac_address:
      id: ethernet_mac_address
      name: "Ethernet MAC Address"
      entity_category: diagnostic
