# UltimateSensor Mini V2 WiFi Basic Cloud Configuration

substitutions:
  device_name: ultimatesensor-mini-v2
  friendly_name: "UltimateSensor Mini V2"
  ultimatesensor_mini_hardware_version: "V2-Basic"
  ultimatesensor_mini_connection_type: "WiFi"
  wifi_fast_connect: "false"
  cloud_mac_sensor_id: wifi_mac_address
  cloud_ip_sensor_id: wifi_ip_address
  default_network: "WiFi Basic + SmartHomeShop App (cloud)"
  tracking_suffix: ""
  update_manifest_url: "https://smarthomeshop.github.io/ultimatesensor-mini/ultimatesensor-mini-v2-wifi-basic-cloud-manifest.json"

packages:
  base: !include base.yaml
  tracking: !include tracking-ld2450.yaml
  net: !include wifi.yaml
  cloud: !include cloud.yaml
  zones: !include cloud-zones.yaml
  firmware: !include firmware-selector.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/ultimatesensor-mini/ultimatesensor-mini-v2/ultimatesensor-mini-v2-wifi-basic-cloud.yaml@main
  import_full_config: false
