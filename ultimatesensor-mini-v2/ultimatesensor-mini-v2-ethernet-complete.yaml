# UltimateSensor Mini V2 Ethernet Complete Configuration
# This configuration includes all sensors, including the SPS30 particulate matter sensor.
# Use this file if your device includes PM/fine dust measurement and uses Ethernet.

substitutions:
  device_name: ultimatesensor-mini-v2
  friendly_name: "UltimateSensor Mini V2"
  ultimatesensor_mini_hardware_version: "V2-Complete"
  ultimatesensor_mini_connection_type: "Ethernet"
  wifi_fast_connect: "false"
  default_network: "Ethernet Complete (local)"
  tracking_suffix: ""
  update_manifest_url: "https://smarthomeshop.github.io/ultimatesensor-mini/ultimatesensor-mini-v2-ethernet-complete-manifest.json"

packages:
  base: !include base.yaml
  tracking: !include tracking-ld2450.yaml
  net: !include ethernet.yaml
  variant: !include complete.yaml
  firmware: !include firmware-selector.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/ultimatesensor-mini/ultimatesensor-mini-v2/ultimatesensor-mini-v2-ethernet-complete.yaml@main
  import_full_config: false
