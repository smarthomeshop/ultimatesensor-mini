# UltimateSensor V2 LD2450 cloud zone support.

script:
  - id: cloud_update_zone_globals
    mode: single
    then:
      - lambda: |-
          id(cloud_has_zones) = true;
          if (id(poly_zone_1_count).has_state() && !isnan(id(poly_zone_1_count).state)) id(cloud_zone1_count) = (int) id(poly_zone_1_count).state;
          if (id(poly_zone_2_count).has_state() && !isnan(id(poly_zone_2_count).state)) id(cloud_zone2_count) = (int) id(poly_zone_2_count).state;
          if (id(poly_zone_3_count).has_state() && !isnan(id(poly_zone_3_count).state)) id(cloud_zone3_count) = (int) id(poly_zone_3_count).state;

interval:
  - interval: 10s
    then:
      - script.execute: cloud_update_zone_globals
