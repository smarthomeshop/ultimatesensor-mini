# UltimateSensor Mini V2 WiFi Basic LD2460 Upgrade Configuration
# Use only when the standard LD2450 module has been replaced by the optional LD2460 upgrade.

substitutions:
  device_name: ultimatesensor-mini-v2
  friendly_name: "UltimateSensor Mini V2"
  ultimatesensor_mini_hardware_version: "V2-Basic-LD2460"
  ultimatesensor_mini_connection_type: "WiFi"
  wifi_fast_connect: "false"
  default_network: "WiFi Basic (local)"
  tracking_suffix: "-ld2460"
  update_manifest_url: "https://smarthomeshop.github.io/ultimatesensor-mini/ultimatesensor-mini-v2-wifi-basic-ld2460-manifest.json"
  setup_product_name: "UltimateSensor Mini"
  setup_product_variant: "V2 WiFi Basic + LD2460 upgrade"
  setup_support_cloud: "true"
  setup_support_home_assistant: "true"
  setup_support_mqtt: "false"
  setup_support_homey: "false"
  setup_support_ethernet: "true"
  setup_support_firmware_selector: "true"
  setup_default_cloud_enabled: "false"
  setup_default_home_assistant_enabled: "true"
  setup_default_mqtt_enabled: "false"
  setup_firmware_options: "WiFi Basic (local)|WiFi Complete (local)|WiFi Basic + SmartHomeShop App (cloud)|WiFi Complete + SmartHomeShop App (cloud)|Ethernet Basic (local)|Ethernet Complete (local)|Ethernet Basic + SmartHomeShop App (cloud)|Ethernet Complete + SmartHomeShop App (cloud)"
  setup_default_firmware_option: ${default_network}

packages:
  base: !include base.yaml
  tracking: !include tracking-ld2460.yaml
  buses: !include buses-ld2460.yaml
  net: !include wifi.yaml
  firmware: !include firmware-selector.yaml
  setup_portal: github://smarthomeshop/setup-portal/packages/setup-portal.yaml@main
  setup_portal_bridge: github://smarthomeshop/setup-portal/packages/firmware-selector-bridge.yaml@main

dashboard_import:
  package_import_url: github://smarthomeshop/ultimatesensor-mini/ultimatesensor-mini-v2/ultimatesensor-mini-v2-wifi-basic-ld2460.yaml@main
  import_full_config: false
