# UltimateSensor Mini V2 WiFi Basic Configuration
# This configuration excludes the SPS30 particulate matter sensor.
# Use this file if your device does not include the PM/fine dust sensor and uses WiFi.

substitutions:
  device_name: ultimatesensor-mini-v2
  friendly_name: "UltimateSensor Mini V2"
  ultimatesensor_mini_hardware_version: "V2-Basic"
  ultimatesensor_mini_connection_type: "WiFi"
  wifi_fast_connect: "false"

packages:
  base: !include base.yaml
  tracking: !include tracking-ld2450.yaml
  net: !include wifi.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/ultimatesensor-mini/ultimatesensor-mini-v2/ultimatesensor-mini-v2-wifi-basic.yaml@main
  import_full_config: false
