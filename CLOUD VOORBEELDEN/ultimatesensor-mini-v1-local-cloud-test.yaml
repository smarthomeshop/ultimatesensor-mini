# UltimateSensor Mini V1 Complete - Local cloud test config
# Uses the published V1 Complete cloud firmware package from GitHub.
# Only overrides local cloud endpoint, device identity, and fixed LAN IP.

substitutions:
  device_name: ultimatesensor-mini-006488
  friendly_name: "UltimateSensor Mini 006488"
  cloud_api_url: "http://192.168.178.208:8889"
  cloud_api_version: "v1"
  cloud_sync_interval: "60s"
  cloud_presence_sync_interval: "10s"
  boot_sound_enabled: "false"

packages:
  ultimatesensor_mini: github://smarthomeshop/ultimatesensor-mini/ultimatesensor-mini-v1/ultimatesensor-mini-complete-cloud.yaml@main

wifi:
  manual_ip:
    static_ip: 192.168.178.62
    gateway: 192.168.178.1
    subnet: 255.255.255.0
    dns1: 192.168.178.1
