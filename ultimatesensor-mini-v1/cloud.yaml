# ====================
# ULTIMATESENSOR MINI CLOUD INTEGRATION
# ====================
# Cloud sync module for UltimateSensor Mini V1.
#
# This module is only included in cloud firmware variants.
# Users who install cloud firmware explicitly want cloud sync,
# so registration and sync start automatically after onboarding.

json:

substitutions:
  cloud_enabled: "true"
  cloud_api_url: "https://api.smarthomeshop.io"
  cloud_api_version: "v1"
  cloud_sync_interval: "60s"
  cloud_presence_sync_interval: "10s"

esphome:
  on_boot:
    - priority: -100
      then:
        - logger.log:
            level: INFO
            format: "Cloud module starting..."
        - delay: 10s
        - if:
            condition:
              lambda: "return !id(cloud_is_registered);"
            then:
              - logger.log:
                  level: INFO
                  format: "Device not registered, starting auto-registration..."
              - script.execute: cloud_register

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Amsterdam"
    servers:
      - "pool.ntp.org"
      - "time.google.com"

globals:
  - id: cloud_device_token
    type: std::string
    restore_value: true
    initial_value: '""'

  - id: cloud_device_id
    type: std::string
    restore_value: true
    initial_value: '""'

  - id: cloud_is_registered
    type: bool
    restore_value: true
    initial_value: "false"

  - id: cloud_is_registering
    type: bool
    restore_value: false
    initial_value: "false"

  - id: cloud_last_sync_success
    type: bool
    restore_value: false
    initial_value: "false"

  - id: cloud_sync_failures
    type: int
    restore_value: false
    initial_value: "0"

  - id: cloud_first_sync_timestamp
    type: uint32_t
    restore_value: true
    initial_value: "0"

  - id: cloud_last_presence_signature
    type: int
    restore_value: false
    initial_value: "-1"

  - id: cloud_do_update_requested
    type: bool
    restore_value: false
    initial_value: "false"

  - id: cloud_has_pm
    type: bool
    restore_value: false
    initial_value: "false"

  - id: cloud_pm_1_0
    type: float
    restore_value: false
    initial_value: "NAN"

  - id: cloud_pm_2_5
    type: float
    restore_value: false
    initial_value: "NAN"

  - id: cloud_pm_4_0
    type: float
    restore_value: false
    initial_value: "NAN"

  - id: cloud_pm_10_0
    type: float
    restore_value: false
    initial_value: "NAN"

  - id: cloud_pmc_0_5
    type: float
    restore_value: false
    initial_value: "NAN"

  - id: cloud_pmc_1_0
    type: float
    restore_value: false
    initial_value: "NAN"

  - id: cloud_pmc_2_5
    type: float
    restore_value: false
    initial_value: "NAN"

  - id: cloud_pmc_4_0
    type: float
    restore_value: false
    initial_value: "NAN"

  - id: cloud_pmc_10_0
    type: float
    restore_value: false
    initial_value: "NAN"

  - id: cloud_pm_size
    type: float
    restore_value: false
    initial_value: "NAN"

button:
  - platform: template
    id: cloud_reset_button
    name: "${friendly_name} Reset Cloud"
    icon: "mdi:cloud-off"
    entity_category: config
    on_press:
      - script.execute: cloud_reset

sensor:
  - platform: template
    id: cloud_sync_failure_count
    name: "${friendly_name} Cloud Sync Failures"
    entity_category: diagnostic
    icon: "mdi:alert-circle"
    accuracy_decimals: 0
    lambda: "return id(cloud_sync_failures);"
    update_interval: 60s

binary_sensor:
  - platform: template
    id: cloud_connected
    name: "${friendly_name} Cloud Connected"
    icon: "mdi:cloud-check"
    entity_category: diagnostic
    lambda: |-
      return id(cloud_is_registered) && id(cloud_last_sync_success);

text_sensor:
  - platform: template
    id: cloud_device_id_sensor
    name: "${friendly_name} Cloud Device ID"
    entity_category: diagnostic
    icon: "mdi:cloud-outline"
    lambda: |-
      if (id(cloud_device_id).length() > 0) {
        return id(cloud_device_id);
      }
      return {"Not registered"};
    update_interval: 60s

  - platform: template
    id: cloud_status_text
    name: "${friendly_name} Cloud Status"
    entity_category: diagnostic
    icon: "mdi:cloud-question"
    lambda: |-
      if (!id(cloud_is_registered)) {
        return {"Registering..."};
      }
      if (id(cloud_device_token).length() == 0) {
        return {"No token"};
      }
      if (id(cloud_sync_failures) > 10) {
        return {"Error: Too many failures"};
      }
      if (id(cloud_last_sync_success)) {
        return {"Connected"};
      }
      return {"Syncing..."};
    update_interval: 15s

script:
  - id: cloud_register
    mode: single
    then:
      - if:
          condition:
            lambda: "return id(cloud_is_registering);"
          then:
            - logger.log:
                level: DEBUG
                format: "Registration already in progress, skipping"
            - script.stop: cloud_register

      - lambda: "id(cloud_is_registering) = true;"

      - logger.log:
          level: INFO
          format: "Starting cloud registration..."

      - wait_until:
          condition:
            lambda: "return id(mac_address).has_state();"
          timeout: 30s

      - wait_until:
          condition:
            lambda: "return id(ip_address).has_state();"
          timeout: 30s

      - if:
          condition:
            lambda: "return !id(mac_address).has_state() || id(mac_address).state.empty();"
          then:
            - logger.log:
                level: WARN
                format: "MAC address not available, aborting registration"
            - lambda: "id(cloud_is_registering) = false;"
            - script.stop: cloud_register

      - logger.log:
          level: INFO
          format: "Registering device with MAC: %s"
          args: ["id(mac_address).state.c_str()"]

      - http_request.post:
          url: "${cloud_api_url}/api/${cloud_api_version}/devices/register"
          request_headers:
            Content-Type: "application/json"
            User-Agent: "UltimateSensorMini/${project_version}"
            Accept: "application/json"
          json: |-
            root["mac_address"] = id(mac_address).state;
            root["hardware_version"] = "${ultimatesensor_mini_hardware_version}";
            root["firmware_version"] = "${project_version}";
            root["product"] = "ultimatesensor-mini";
            if (id(ip_address).has_state()) {
              root["local_ip"] = id(ip_address).state;
            }
          capture_response: true
          max_response_buffer_size: 512
          on_response:
            then:
              - lambda: |-
                  ESP_LOGI("cloud", "Registration response - Status: %d", response->status_code);
                  id(cloud_is_registering) = false;

                  if (response->status_code == 200 || response->status_code == 201) {
                    ESP_LOGD("cloud", "Response body: %s", body.c_str());

                    json::parse_json(body, [](JsonObject root) -> bool {
                      if (root["device_id"].is<const char*>() && root["token"].is<const char*>()) {
                        id(cloud_device_id) = root["device_id"].as<std::string>();
                        id(cloud_device_token) = root["token"].as<std::string>();
                        id(cloud_is_registered) = true;
                        id(cloud_sync_failures) = 0;
                        ESP_LOGI("cloud", "Registration successful! Device ID: %s", id(cloud_device_id).c_str());
                        return true;
                      }
                      ESP_LOGW("cloud", "Invalid response format");
                      return false;
                    });
                  } else if (response->status_code == 422) {
                    ESP_LOGW("cloud", "Registration failed: validation error (422)");
                    id(cloud_sync_failures)++;
                  } else if (response->status_code == 429) {
                    ESP_LOGW("cloud", "Registration failed: rate limited (429)");
                    id(cloud_sync_failures) += 5;
                  } else {
                    ESP_LOGW("cloud", "Registration failed: HTTP %d", response->status_code);
                    id(cloud_sync_failures)++;
                  }
          on_error:
            then:
              - logger.log:
                  level: WARN
                  format: "Cloud registration network error"
              - lambda: |-
                  id(cloud_sync_failures)++;
                  id(cloud_is_registering) = false;

  - id: cloud_send_batch
    mode: single
    then:
      - if:
          condition:
            lambda: "return !id(cloud_is_registered);"
          then:
            - logger.log:
                level: DEBUG
                format: "Not registered, attempting registration"
            - script.execute: cloud_register
            - script.stop: cloud_send_batch

      - if:
          condition:
            lambda: "return id(cloud_device_token).length() == 0;"
          then:
            - logger.log:
                level: WARN
                format: "No token, re-registering"
            - lambda: "id(cloud_is_registered) = false;"
            - script.execute: cloud_register
            - script.stop: cloud_send_batch

      - if:
          condition:
            lambda: "return id(cloud_sync_failures) > 10;"
          then:
            - logger.log:
                level: WARN
                format: "Too many failures (%d), backing off"
                args: ["id(cloud_sync_failures)"]
            - delay: 10min
            - lambda: "id(cloud_sync_failures) = 0;"
            - script.stop: cloud_send_batch

      - lambda: "id(cloud_last_sync_success) = false;"

      - http_request.post:
          url: "${cloud_api_url}/api/${cloud_api_version}/devices/ingest"
          request_headers:
            Content-Type: "application/json"
            Authorization: !lambda |-
              static std::string auth;
              auth = "Bearer ";
              auth += id(cloud_device_token);
              return auth.c_str();
            User-Agent: "UltimateSensorMini/${project_version}"
            Accept: "application/json"
          capture_response: true
          max_response_buffer_size: 256
          json: |-
            root["device_id"] = id(cloud_device_id);
            root["timestamp"] = id(sntp_time).now().timestamp;

            if (id(scd41_co2).has_state() && !isnan(id(scd41_co2).state)) {
              root["co2_ppm"] = id(scd41_co2).state;
            }
            if (id(scd41_temperature).has_state() && !isnan(id(scd41_temperature).state)) {
              root["temperature_c"] = id(scd41_temperature).state;
            }
            if (id(scd41_humidity).has_state() && !isnan(id(scd41_humidity).state)) {
              root["humidity_pct"] = id(scd41_humidity).state;
            }
            if (id(voc_index).has_state() && !isnan(id(voc_index).state)) {
              root["voc_index"] = id(voc_index).state;
            }
            if (id(nox_index).has_state() && !isnan(id(nox_index).state)) {
              root["nox_index"] = id(nox_index).state;
            }
            if (id(illuminance).has_state() && !isnan(id(illuminance).state)) {
              root["illuminance_lux"] = id(illuminance).state;
            }

            if (id(occupancy_state).has_state()) {
              root["occupancy"] = id(occupancy_state).state;
            }
            if (id(zone1_target_count).has_state() && !isnan(id(zone1_target_count).state)) {
              root["zone1_target_count"] = (int) id(zone1_target_count).state;
            }
            if (id(zone2_target_count).has_state() && !isnan(id(zone2_target_count).state)) {
              root["zone2_target_count"] = (int) id(zone2_target_count).state;
            }
            if (id(zone3_target_count).has_state() && !isnan(id(zone3_target_count).state)) {
              root["zone3_target_count"] = (int) id(zone3_target_count).state;
            }
            if (id(zone4_target_count).has_state() && !isnan(id(zone4_target_count).state)) {
              root["zone4_target_count"] = (int) id(zone4_target_count).state;
            }

            if (id(wifi_signal_sensor).has_state() && !isnan(id(wifi_signal_sensor).state)) {
              root["wifi_signal_dbm"] = id(wifi_signal_sensor).state;
            }
            if (id(cpu_temperature).has_state() && !isnan(id(cpu_temperature).state)) {
              root["cpu_temperature_c"] = id(cpu_temperature).state;
            }

            if (id(cloud_has_pm)) {
              if (!isnan(id(cloud_pm_1_0))) root["pm_1_0_ugm3"] = id(cloud_pm_1_0);
              if (!isnan(id(cloud_pm_2_5))) root["pm_2_5_ugm3"] = id(cloud_pm_2_5);
              if (!isnan(id(cloud_pm_4_0))) root["pm_4_0_ugm3"] = id(cloud_pm_4_0);
              if (!isnan(id(cloud_pm_10_0))) root["pm_10_0_ugm3"] = id(cloud_pm_10_0);
              if (!isnan(id(cloud_pmc_0_5))) root["pmc_0_5"] = id(cloud_pmc_0_5);
              if (!isnan(id(cloud_pmc_1_0))) root["pmc_1_0"] = id(cloud_pmc_1_0);
              if (!isnan(id(cloud_pmc_2_5))) root["pmc_2_5"] = id(cloud_pmc_2_5);
              if (!isnan(id(cloud_pmc_4_0))) root["pmc_4_0"] = id(cloud_pmc_4_0);
              if (!isnan(id(cloud_pmc_10_0))) root["pmc_10_0"] = id(cloud_pmc_10_0);
              if (!isnan(id(cloud_pm_size))) root["pm_size"] = id(cloud_pm_size);
            }

            root["firmware_version"] = "${project_version}";
            root["hardware_version"] = "${ultimatesensor_mini_hardware_version}";
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    id(cloud_last_sync_success) = true;
                    id(cloud_sync_failures) = 0;

                    if (id(cloud_first_sync_timestamp) == 0) {
                      id(cloud_first_sync_timestamp) = id(sntp_time).now().timestamp;
                      ESP_LOGI("cloud", "First sync timestamp recorded");
                    }

                    ESP_LOGD("cloud", "Batch sync successful");

                    json::parse_json(body, [](JsonObject root) -> bool {
                      if (root["do_update"].is<bool>() && root["do_update"].as<bool>()) {
                        ESP_LOGI("cloud", "Cloud requested a firmware update");
                        id(cloud_do_update_requested) = true;
                      }
                      return true;
                    });
                  } else if (response->status_code == 401) {
                    ESP_LOGW("cloud", "Token invalid/expired, re-registering");
                    id(cloud_is_registered) = false;
                    id(cloud_device_token) = "";
                    id(cloud_sync_failures)++;
                  } else if (response->status_code == 429) {
                    ESP_LOGW("cloud", "Rate limited, backing off");
                    id(cloud_sync_failures) += 5;
                  } else {
                    ESP_LOGW("cloud", "Sync failed: HTTP %d", response->status_code);
                    id(cloud_sync_failures)++;
                  }

              - if:
                  condition:
                    lambda: "return id(cloud_last_sync_success);"
                  then:
                    - light.turn_on:
                        id: rgb_front_light
                        brightness: 50%
                        red: 0%
                        green: 0%
                        blue: 100%
                        flash_length: 100ms

              - if:
                  condition:
                    lambda: "return id(cloud_do_update_requested);"
                  then:
                    - lambda: "id(cloud_do_update_requested) = false;"
                    - logger.log:
                        level: INFO
                        format: "Checking firmware manifest for cloud-requested update"
                    - update.check:
                        id: firmware_update
                    - delay: 15s
                    - update.perform:
                        id: firmware_update
          on_error:
            then:
              - lambda: |-
                  id(cloud_last_sync_success) = false;
                  id(cloud_sync_failures)++;
                  ESP_LOGW("cloud", "Batch sync network error, failures: %d", id(cloud_sync_failures));

  - id: cloud_reset
    mode: single
    then:
      - logger.log:
          level: INFO
          format: "Resetting cloud registration..."
      - lambda: |-
          id(cloud_device_id) = "";
          id(cloud_device_token) = "";
          id(cloud_is_registered) = false;
          id(cloud_last_sync_success) = false;
          id(cloud_sync_failures) = 0;
          id(cloud_first_sync_timestamp) = 0;
          id(cloud_has_pm) = false;
          id(cloud_last_presence_signature) = -1;
      - logger.log:
          level: INFO
          format: "Cloud registration reset complete"
      - delay: 5s
      - script.execute: cloud_register

  - id: cloud_send_presence_if_changed
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              int signature = id(occupancy_state).state ? 1 : 0;
              signature = signature * 31 + (id(zone1_target_count).has_state() && !isnan(id(zone1_target_count).state) ? (int) id(zone1_target_count).state : -1);
              signature = signature * 31 + (id(zone2_target_count).has_state() && !isnan(id(zone2_target_count).state) ? (int) id(zone2_target_count).state : -1);
              signature = signature * 31 + (id(zone3_target_count).has_state() && !isnan(id(zone3_target_count).state) ? (int) id(zone3_target_count).state : -1);
              signature = signature * 31 + (id(zone4_target_count).has_state() && !isnan(id(zone4_target_count).state) ? (int) id(zone4_target_count).state : -1);
              return signature == id(cloud_last_presence_signature);
          then:
            - script.stop: cloud_send_presence_if_changed
      - lambda: |-
          int signature = id(occupancy_state).state ? 1 : 0;
          signature = signature * 31 + (id(zone1_target_count).has_state() && !isnan(id(zone1_target_count).state) ? (int) id(zone1_target_count).state : -1);
          signature = signature * 31 + (id(zone2_target_count).has_state() && !isnan(id(zone2_target_count).state) ? (int) id(zone2_target_count).state : -1);
          signature = signature * 31 + (id(zone3_target_count).has_state() && !isnan(id(zone3_target_count).state) ? (int) id(zone3_target_count).state : -1);
          signature = signature * 31 + (id(zone4_target_count).has_state() && !isnan(id(zone4_target_count).state) ? (int) id(zone4_target_count).state : -1);
          id(cloud_last_presence_signature) = signature;
      - script.execute: cloud_send_batch

interval:
  - interval: ${cloud_presence_sync_interval}
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - script.execute: cloud_send_presence_if_changed

  - interval: ${cloud_sync_interval}
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - script.execute: cloud_send_batch
