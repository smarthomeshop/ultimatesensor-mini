# UltimateSensor Mini Beta Common Configuration
# Experimental ESP-IDF firmware with on-device Micro Wake Word.
# Thanks to HA-TB303. This beta firmware is based on:
# https://github.com/HA-TB303/ultimatesensor_mini

substitutions:
  project_main_version: "2"
  project_version: "2.36-beta.61"
  log_level: "DEBUG"
  wifi_fast_connect: "true"
  wake_word: "okay_nabu"

# Shared SmartHomeShop LD2450 polygon zones layer (zones, entry lines,
# people counting + panel push API). Radar base config is defined below.
packages:
  ld2450_polygon_zones: github://smarthomeshop/ld2450/packages/ld2450-polygon-zones.yaml@main

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  min_version: 2025.2.0
  platformio_options:
    build_flags: -DBOARD_HAS_PSRAM
    board_build.flash_mode: dio
    board_upload.maximum_size: 16777216
  project:
    name: "smarthomeshop.ultimatesensor_mini_beta"
    version: ${project_version}
    on_update:
      then:
        - logger.log: "UltimateSensor Mini beta firmware updated successfully!"
        - light.turn_on:
            id: rgb_front_led
            brightness: 100%
            red: 0%
            green: 100%
            blue: 0%
            flash_length: 500ms

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  partitions: "default_16MB.csv"
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240: "y"
      CONFIG_ESP32_S3_BOX_BOARD: "y"
      CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM: "16"
      CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM: "512"
      CONFIG_TCPIP_RECVMBOX_SIZE: "512"
      CONFIG_TCP_SND_BUF_DEFAULT: "65535"
      CONFIG_TCP_WND_DEFAULT: "512000"
      CONFIG_TCP_RECVMBOX_SIZE: "512"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: ${log_level}
  hardware_uart: UART0

api:

ota:
  - platform: esphome
    id: ota_esphome
  - platform: http_request
    id: ota_http_request

http_request:
  useragent: ultimatesensor-mini-beta-esphome
  verify_ssl: false

update:
  - platform: http_request
    name: "UltimateSensor Mini Beta Firmware"
    source: ${update_manifest_url}
    disabled_by_default: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: ${wifi_fast_connect}
  power_save_mode: light
  ap:
    ssid: ${device_name}
    password: ${device_name}

captive_portal:
improv_serial:

globals:
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: 'true'

status_led:
  pin: GPIO19

uart:
  id: uart_ld2450
  tx_pin: GPIO13
  rx_pin: GPIO14
  baud_rate: 256000
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 1024

ld2450:
  id: ld2450_radar
  uart_id: uart_ld2450

i2c:
  id: bus_a
  sda: GPIO11
  scl: GPIO10
  scan: true
  frequency: 100kHz

script:
  - id: reset_led
    then:
      - if:
          condition:
            switch.is_on: use_wake_word
          then:
            - light.turn_on:
                id: rgb_front_led
                blue: 100%
                red: 0%
                green: 0%
                brightness: 25%
                effect: none
          else:
            - light.turn_off: rgb_front_led

light:
  - platform: esp32_rmt_led_strip
    id: rgb_front_led
    name: "Front Light"
    pin: GPIO5
    num_leds: 1
    rgb_order: GRB
    chipset: ws2812
    rmt_symbols: 96
    default_transition_length: 0s
    effects:
      - addressable_color_wipe:
          name: "Connecting"
          colors:
            - red: 60%
              green: 60%
              blue: 60%
              num_leds: 1
            - red: 60%
              green: 60%
              blue: 0%
              num_leds: 1
          add_led_interval: 100ms
          reverse: true
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Slow Pulse"
          transition_length: 250ms
          update_interval: 250ms
          min_brightness: 50%
          max_brightness: 100%

  - platform: esp32_rmt_led_strip
    id: rgb_back_led
    name: "Back Light"
    pin: GPIO20
    num_leds: 1
    rgb_order: GRB
    chipset: ws2812
    rmt_symbols: 96

i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO16
  - id: i2s_out
    i2s_lrclk_pin: GPIO8
    i2s_bclk_pin: GPIO18

microphone:
  - platform: i2s_audio
    i2s_audio_id: i2s_in
    id: microphone_01
    i2s_din_pin: GPIO15
    adc_type: external
    pdm: false
    channel: right
    sample_rate: 16000
    bits_per_sample: 32bit

speaker:
  - platform: i2s_audio
    i2s_audio_id: i2s_out
    id: speaker_id
    dac_type: external
    i2s_dout_pin: GPIO17
    sample_rate: 44100

  - platform: mixer
    id: mixer_speaker_id
    output_speaker: speaker_id
    source_speakers:
      - id: announcement_spk_mixer_input
      - id: media_spk_mixer_input

  - platform: resampler
    id: media_spk_resampling_input
    output_speaker: media_spk_mixer_input

  - platform: resampler
    id: announcement_spk_resampling_input
    output_speaker: announcement_spk_mixer_input

media_player:
  - platform: speaker
    id: media_player_01
    name: "Media Player"
    media_pipeline:
      speaker: media_spk_resampling_input
      num_channels: 1
    announcement_pipeline:
      speaker: announcement_spk_resampling_input
      num_channels: 1

micro_wake_word:
  id: mww
  models:
    - model: okay_nabu
    - model: hey_jarvis
  on_wake_word_detected:
    - light.turn_on:
        id: rgb_front_led
        blue: 0%
        red: 0%
        green: 100%
        brightness: 75%
        effect: "Slow Pulse"
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: microphone_01
  media_player: media_player_01
  micro_wake_word: mww
  use_wake_word: false
  auto_gain: 25dBFS
  noise_suppression_level: 1

  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - delay: 500ms
    - if:
        condition:
          switch.is_on: use_wake_word
        then:
          - micro_wake_word.start:
          - script.execute: reset_led

  on_client_disconnected:
    - voice_assistant.stop
    - micro_wake_word.stop
    - light.turn_on:
        id: rgb_front_led
        blue: 0%
        red: 100%
        green: 100%
        brightness: 50%

  on_listening:
    - light.turn_on:
        id: rgb_front_led
        blue: 100%
        red: 0%
        green: 0%
        brightness: 50%
        effect: "Slow Pulse"

  on_tts_start:
    - light.turn_on:
        id: rgb_front_led
        blue: 0%
        red: 0%
        green: 100%
        brightness: 50%
        effect: "Slow Pulse"

  on_end:
    then:
      - delay: 1s
      - wait_until:
          lambda: 'return id(media_player_01).state == media_player::MEDIA_PLAYER_STATE_IDLE;'
      - delay: 500ms
      - light.turn_off: rgb_front_led
      - script.execute: reset_led
      - if:
          condition:
            switch.is_on: use_wake_word
          then:
            - micro_wake_word.start:

  on_error:
    - light.turn_on:
        id: rgb_front_led
        blue: 0%
        red: 100%
        green: 0%
        brightness: 100%
        effect: none
    - delay: 1s
    - script.execute: reset_led

binary_sensor:
  - platform: status
    name: "Status"

  - platform: ld2450
    ld2450_id: ld2450_radar
    has_target:
      name: "Presence"
      device_class: occupancy
      filters:
        - delayed_off: 1s
    has_moving_target:
      name: "Motion"
      device_class: motion
      filters:
        - delayed_off: 1s
    has_still_target:
      name: "Still Presence"
      device_class: occupancy
      filters:
        - delayed_off: 1s

  - platform: template
    id: zone_1_presence
    name: "Zone 1 Presence"
    device_class: occupancy
    lambda: |-
      if (!id(zone_1_enabled).state) {
        return false;
      }
      return id(zone_1_target_count).state > 0;
    filters:
      - delayed_off: 1s

  - platform: template
    id: zone_2_presence
    name: "Zone 2 Presence"
    device_class: occupancy
    lambda: |-
      if (!id(zone_2_enabled).state) {
        return false;
      }
      return id(zone_2_target_count).state > 0;
    filters:
      - delayed_off: 1s

  - platform: template
    id: zone_3_presence
    name: "Zone 3 Presence"
    device_class: occupancy
    lambda: |-
      if (!id(zone_3_enabled).state) {
        return false;
      }
      return id(zone_3_target_count).state > 0;
    filters:
      - delayed_off: 1s

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

  - platform: ld2450
    ld2450_id: ld2450_radar
    target_count:
      name: "Radar Target Count"
      filters:
        - throttle: 1s
    still_target_count:
      name: "Radar Still Target Count"
      filters:
        - throttle: 1s
    moving_target_count:
      name: "Radar Moving Target Count"
      filters:
        - throttle: 1s
    target_1:
      x:
        id: radar_target1_x
        name: "Target 1 X"
        filters:
          - throttle: 250ms
      y:
        id: radar_target1_y
        name: "Target 1 Y"
        filters:
          - throttle: 250ms
    target_2:
      x:
        id: radar_target2_x
        name: "Target 2 X"
        filters:
          - throttle: 250ms
      y:
        id: radar_target2_y
        name: "Target 2 Y"
        filters:
          - throttle: 250ms
    target_3:
      x:
        id: radar_target3_x
        name: "Target 3 X"
        filters:
          - throttle: 250ms
      y:
        id: radar_target3_y
        name: "Target 3 Y"
        filters:
          - throttle: 250ms
    zone_1:
      target_count:
        id: zone_1_target_count
        name: "Zone 1 Target Count"
        filters:
          - throttle: 1s
      still_target_count:
        id: zone_1_still_target_count
        name: "Zone 1 Still Target Count"
        filters:
          - throttle: 1s
      moving_target_count:
        id: zone_1_moving_target_count
        name: "Zone 1 Moving Target Count"
        filters:
          - throttle: 1s
    zone_2:
      target_count:
        id: zone_2_target_count
        name: "Zone 2 Target Count"
        filters:
          - throttle: 1s
      still_target_count:
        id: zone_2_still_target_count
        name: "Zone 2 Still Target Count"
        filters:
          - throttle: 1s
      moving_target_count:
        id: zone_2_moving_target_count
        name: "Zone 2 Moving Target Count"
        filters:
          - throttle: 1s
    zone_3:
      target_count:
        id: zone_3_target_count
        name: "Zone 3 Target Count"
        filters:
          - throttle: 1s
      still_target_count:
        id: zone_3_still_target_count
        name: "Zone 3 Still Target Count"
        filters:
          - throttle: 1s
      moving_target_count:
        id: zone_3_moving_target_count
        name: "Zone 3 Moving Target Count"
        filters:
          - throttle: 1s

  - platform: bh1750
    name: "Illuminance"
    id: illuminance
    address: 0x23
    update_interval: 120s

  - platform: sgp4x
    voc:
      name: "VOC Index"
    nox:
      name: "NOx Index"
    compensation:
      humidity_source: scd41_humidity
      temperature_source: scd41_temperature
    update_interval: 120s

  - platform: scd4x
    id: my_scd41
    co2:
      name: "CO2"
      id: scd41_co2
    temperature:
      name: "Temperature"
      id: scd41_temperature
      accuracy_decimals: 1
      filters:
        - lambda: return x + id(scd41_temperature_offset).state;
    humidity:
      name: "Humidity"
      id: scd41_humidity
      accuracy_decimals: 0
      filters:
        - lambda: return x + id(scd41_humidity_offset).state;
    measurement_mode: low_power_periodic
    temperature_offset: 2.3
    automatic_self_calibration: true
    update_interval: 60s

number:
  - platform: ld2450
    ld2450_id: ld2450_radar
    presence_timeout:
      id: ld2450_presence_timeout
      internal: true
    zone_1:
      x1:
        name: "Zone 1 X1"
      y1:
        name: "Zone 1 Y1"
      x2:
        name: "Zone 1 X2"
      y2:
        name: "Zone 1 Y2"
    zone_2:
      x1:
        name: "Zone 2 X1"
      y1:
        name: "Zone 2 Y1"
      x2:
        name: "Zone 2 X2"
      y2:
        name: "Zone 2 Y2"
    zone_3:
      x1:
        name: "Zone 3 X1"
      y1:
        name: "Zone 3 Y1"
      x2:
        name: "Zone 3 X2"
      y2:
        name: "Zone 3 Y2"

  - platform: template
    id: user_presence_timeout
    name: "Presence Timeout"
    unit_of_measurement: "s"
    min_value: 1
    max_value: 600
    step: 1
    optimistic: true
    initial_value: 60
    set_action:
      then:
        - number.set:
            id: ld2450_presence_timeout
            value: !lambda 'return x;'

  - platform: template
    name: "Temperature Offset"
    id: scd41_temperature_offset
    initial_value: 2.3
    min_value: -50.0
    max_value: 50.0
    step: 0.1
    entity_category: config
    unit_of_measurement: "C"
    optimistic: true
    update_interval: never
    mode: box

  - platform: template
    name: "Humidity Offset"
    id: scd41_humidity_offset
    restore_value: true
    initial_value: -1
    min_value: -50.0
    max_value: 50.0
    step: 0.1
    entity_category: config
    unit_of_measurement: "%"
    optimistic: true
    update_interval: never
    mode: box

switch:
  - platform: template
    name: "Enable Voice Assistant"
    id: use_wake_word
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: mdi:assistant
    on_turn_on:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - voice_assistant.stop
            - delay: 1s
            - if:
                condition:
                  not:
                    - voice_assistant.is_running
                then:
                  - micro_wake_word.start:
      - script.execute: reset_led
    on_turn_off:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - voice_assistant.stop
            - micro_wake_word.stop
      - script.execute: reset_led

  - platform: template
    id: zone_1_enabled
    name: "Zone 1 Enabled"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    icon: mdi:target-variant

  - platform: template
    id: zone_2_enabled
    name: "Zone 2 Enabled"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    icon: mdi:target-variant

  - platform: template
    id: zone_3_enabled
    name: "Zone 3 Enabled"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    icon: mdi:target-variant

  - platform: ld2450
    ld2450_id: ld2450_radar
    bluetooth:
      name: "Radar Bluetooth"
    multi_target:
      name: "Radar Multi Target"

button:
  - platform: restart
    name: "Restart"
    entity_category: config

  - platform: safe_mode
    name: "Restart in Safe Mode"
    entity_category: diagnostic

  - platform: factory_reset
    name: "Factory Reset"
    entity_category: config

  - platform: template
    name: "CO2 Manual Calibration"
    entity_category: config
    on_press:
      then:
        - scd4x.perform_forced_calibration:
            value: 420
            id: my_scd41

  - platform: ld2450
    ld2450_id: ld2450_radar
    factory_reset:
      name: "LD2450 Factory Reset"
      entity_category: diagnostic
      disabled_by_default: true
    restart:
      name: "LD2450 Restart"
      entity_category: diagnostic

text_sensor:
  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true
    entity_category: diagnostic

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic
    mac_address:
      name: "WiFi MAC Address"
      entity_category: diagnostic

  - platform: template
    name: "Hardware Version"
    lambda: |-
      return {"${ultimatesensor_mini_hardware_version}"};
    entity_category: diagnostic

  - platform: ld2450
    ld2450_id: ld2450_radar
    version:
      name: "Radar Firmware"
    mac_address:
      name: "Radar BT MAC"
