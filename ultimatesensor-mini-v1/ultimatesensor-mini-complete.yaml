# UltimateSensor Complete Configuration
# This configuration includes settings for all sensors, including the Particulate Matter (PM) sensor.
# Use this file if your device includes the PM/fine dust measurement capability.

# Name of device
substitutions:
  device_name: ultimatesensor-mini
  friendly_name: "UltimateSensor Mini"
  ultimatesensor_mini_hardware_version: "V1-Complete"
  wifi_fast_connect: "true"
  update_manifest_url: "https://smarthomeshop.github.io/ultimatesensor-mini/ultimatesensor-mini-complete-manifest.json"

packages:
  common: !include ultimatesensor-mini-common.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/ultimatesensor-mini/ultimatesensor-mini-v1/ultimatesensor-mini-complete.yaml@main
  import_full_config: false

# ═══════════════════════════════════════════════════════════════════════
# SPS30 Particulate Matter Sensor (Complete version only)
#
# The SPS30 supports idle mode to extend sensor lifetime by turning off
# the fan and laser between measurement cycles.
#
# Two configurable sliders appear under Configuration entities in Home Assistant:
#
#   SPS30 Update Interval (default: 60s, range: 10-300s)
#     How often the sensor reads data when active.
#
#   SPS30 Idle Interval (default: 5 min, range: 0-30 min)
#     How long the sensor sleeps between measurement cycles.
#     Set to 0 to keep the sensor always on (no idle mode).
#
# With default settings (60s update, 5min idle), the sensor runs at ~33%
# duty cycle, roughly tripling the SPS30's operational lifetime.
# ═══════════════════════════════════════════════════════════════════════

sensor:
  - platform: sps30
    id: sps30_sensor
    pm_1_0:
      id: "PM_1_0"
      name: "PM <1µm Weight concentration"
    pm_2_5:
      id: "PM_2_5"
      name: "PM <2.5µm Weight concentration"
    pm_4_0:
      id: "PM_4_0"
      name: "PM <4µm Weight concentration"
    pm_10_0:
      id: "PM_10_0"
      name: "PM <10µm Weight concentration"
    pmc_0_5:
      id: "PMC_0_5"
      name: "PM <0.5µm Number concentration"
    pmc_1_0:
      id: "PMC_1_0"
      name: "PM <1µm Number concentration"
    pmc_2_5:
      id: "PMC_2_5"
      name: "PM <2.5µm Number concentration"
    pmc_4_0:
      id: "PMC_4_0"
      name: "PM <4µm Number concentration"
    pmc_10_0:
      id: "PMC_10_0"
      name: "PM <10µm Number concentration"
    pm_size:
      id: "pm_size"
      name: "Typical Particle size"
    address: 0x69
    update_interval: 60s

# SPS30 idle cycle management script
script:
  - id: sps30_idle_cycle
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(sps30_idle_interval).state <= 0;'
          then:
            - sps30.start_measurement: sps30_sensor
          else:
            - while:
                condition:
                  lambda: 'return id(sps30_idle_interval).state > 0;'
                then:
                  - sps30.start_measurement: sps30_sensor
                  # Warmup (30s) + 2x update_interval for reliable readings
                  - delay: !lambda |-
                      return (uint32_t)(30000 + id(sps30_update_interval).state * 2000);
                  - sps30.stop_measurement: sps30_sensor
                  - delay: !lambda |-
                      return (uint32_t)(id(sps30_idle_interval).state * 60000);

# SPS30 configurable interval sliders (visible under Configuration in HA)
number:
  # How often the SPS30 reads when active (default: 60 seconds)
  - platform: template
    name: "SPS30 Update Interval"
    id: sps30_update_interval
    min_value: 10
    max_value: 300
    step: 10
    initial_value: 60
    unit_of_measurement: "s"
    icon: mdi:update
    entity_category: config
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            id(sps30_sensor).set_update_interval((uint32_t)(x * 1000));
  # How long the SPS30 sleeps between measurements (default: 5 minutes, 0 = always on)
  - platform: template
    name: "SPS30 Idle Interval"
    id: sps30_idle_interval
    min_value: 0
    max_value: 30
    step: 1
    initial_value: 5
    unit_of_measurement: "min"
    icon: mdi:sleep
    entity_category: config
    optimistic: true
    restore_value: true
    on_value:
      then:
        - script.execute: sps30_idle_cycle
