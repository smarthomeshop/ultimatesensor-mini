# UltimateSensor Mini Complete Beta Configuration
# Experimental local wake word beta with the SPS30 particulate matter sensor.

substitutions:
  device_name: ultimatesensor-mini-beta
  friendly_name: "UltimateSensor Mini Beta"
  ultimatesensor_mini_hardware_version: "V1-Beta-Complete"
  wifi_fast_connect: "true"
  update_manifest_url: "https://smarthomeshop.github.io/ultimatesensor-mini/beta-ultimatesensor-mini-complete-manifest.json"

packages:
  common: !include beta-ultimatesensor-mini-common.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/ultimatesensor-mini/ultimatesensor-mini-v1/beta-ultimatesensor-mini-complete.yaml@main
  import_full_config: false

# SPS30 Particulate Matter Sensor (Complete beta version only)
sensor:
  - platform: sps30
    id: sps30_sensor
    pm_1_0:
      name: "PM <1um Weight Concentration"
      id: "PM_1_0"
    pm_2_5:
      name: "PM <2.5um Weight Concentration"
      id: "PM_2_5"
    pm_4_0:
      name: "PM <4um Weight Concentration"
      id: "PM_4_0"
    pm_10_0:
      name: "PM <10um Weight Concentration"
      id: "PM_10_0"
    pmc_0_5:
      name: "PM <0.5um Number Concentration"
      id: "PMC_0_5"
    pmc_1_0:
      name: "PM <1um Number Concentration"
      id: "PMC_1_0"
    pmc_2_5:
      name: "PM <2.5um Number Concentration"
      id: "PMC_2_5"
    pmc_4_0:
      name: "PM <4um Number Concentration"
      id: "PMC_4_0"
    pmc_10_0:
      name: "PM <10um Number Concentration"
      id: "PMC_10_0"
    pm_size:
      name: "PM Typical Particle Size"
      id: "pm_size"
    address: 0x69
    update_interval: 60s

script:
  - id: sps30_idle_cycle
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(sps30_idle_interval).state <= 0;'
          then:
            - sps30.start_measurement: sps30_sensor
          else:
            - while:
                condition:
                  lambda: 'return id(sps30_idle_interval).state > 0;'
                then:
                  - sps30.start_measurement: sps30_sensor
                  - delay: !lambda |-
                      return (uint32_t)(30000 + id(sps30_update_interval).state * 2000);
                  - sps30.stop_measurement: sps30_sensor
                  - delay: !lambda |-
                      return (uint32_t)(id(sps30_idle_interval).state * 60000);

number:
  - platform: template
    name: "SPS30 Update Interval"
    id: sps30_update_interval
    min_value: 10
    max_value: 300
    step: 10
    initial_value: 60
    unit_of_measurement: "s"
    icon: mdi:update
    entity_category: config
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            id(sps30_sensor).set_update_interval((uint32_t)(x * 1000));

  - platform: template
    name: "SPS30 Idle Interval"
    id: sps30_idle_interval
    min_value: 0
    max_value: 30
    step: 1
    initial_value: 5
    unit_of_measurement: "min"
    icon: mdi:sleep
    entity_category: config
    optimistic: true
    restore_value: true
    on_value:
      then:
        - script.execute: sps30_idle_cycle
