# UltimateSensor Basic Cloud Configuration
# This configuration uses SmartHomeShop App cloud sync without the SPS30 sensor.

substitutions:
  device_name: ultimatesensor-mini
  friendly_name: "UltimateSensor Mini"
  ultimatesensor_mini_hardware_version: "V1-Basic"
  wifi_fast_connect: "true"
  update_manifest_url: "https://smarthomeshop.github.io/ultimatesensor-mini/ultimatesensor-mini-basic-cloud-manifest.json"
  basic_manifest_url: "https://smarthomeshop.github.io/ultimatesensor-mini/ultimatesensor-mini-basic-manifest.json"
  complete_manifest_url: "https://smarthomeshop.github.io/ultimatesensor-mini/ultimatesensor-mini-complete-manifest.json"
  basic_cloud_manifest_url: "https://smarthomeshop.github.io/ultimatesensor-mini/ultimatesensor-mini-basic-cloud-manifest.json"
  complete_cloud_manifest_url: "https://smarthomeshop.github.io/ultimatesensor-mini/ultimatesensor-mini-complete-cloud-manifest.json"
  default_network: "WiFi Basic + SmartHomeShop App (cloud)"
  cloud_enabled: "true"

packages:
  common: !include ultimatesensor-mini-common.yaml
  cloud: !include cloud.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/ultimatesensor-mini/ultimatesensor-mini-v1/ultimatesensor-mini-basic-cloud.yaml@main
  import_full_config: false
