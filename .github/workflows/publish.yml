      needs.publish-ultimatesensor-mini-v2-wifi-basic-ld2460.result != 'failure' &&
      needs.publish-ultimatesensor-mini-v2-wifi-basic-ld2460.result != 'cancelled' &&
      needs.publish-ultimatesensor-mini-v2-wifi-complete-ld2460.result != 'failure' &&
      needs.publish-ultimatesensor-mini-v2-wifi-complete-ld2460.result != 'cancelled' &&
      needs.publish-ultimatesensor-mini-v2-ethernet-basic-ld2460.result != 'failure' &&
