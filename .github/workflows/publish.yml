      needs.publish-ultimatesensor-mini-v2-ethernet-complete-ld2460-cloud.result != 'cancelled'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-gh-pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Collect firmware payloads
        uses: actions/download-artifact@v4
        with:
          pattern: gh-pages-*
          path: output
          merge-multiple: true

      - name: Deploy firmware
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: output
          clean: false
          force: false
          attempt-limit: 30

  create-releases:
    name: Create GitHub releases
    needs: [detect-changes, deploy-pages]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.result == 'success' &&
      needs.deploy-pages.result == 'success'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Create releases for changed hardware versions
        shell: bash
        run: |
          set -euo pipefail

          create_release() {
            local tag_name=$1
            local title=$2
            local heading="## [${title}]"

            if gh release view "$tag_name" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release $tag_name already exists, skipping"
              return
            fi

            awk -v heading="$heading" '
              index($0, heading) == 1 { found=1; next }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md > release-notes.txt

            if ! grep -q '[^[:space:]]' release-notes.txt; then
              awk '
                $0 == "## [Unreleased]" { found=1; next }
                found && /^## \[/ { exit }
                found { print }
              ' CHANGELOG.md > release-notes.txt
            fi

            sed -i '/^- Add customer-facing firmware notes here before merging a PR\.$/d' release-notes.txt
            sed -i '/^- Add customer-facing changes here before the next release is published\.$/d' release-notes.txt

            if ! grep -q '[^[:space:]]' release-notes.txt; then
              printf '%s\n\n%s\n' \
                "Customer-facing firmware notes live in CHANGELOG.md." \
                "Changelog: https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md" \
                > release-notes.txt
            fi

            gh release create "$tag_name" \
              -R "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$title" \
              --notes-file release-notes.txt
          }

          if [[ "${{ needs.detect-changes.outputs.v1_changed }}" == "true" && ! "${{ needs.detect-changes.outputs.v1_version }}" =~ ^dev- ]]; then
            create_release "ultimatesensor-mini-v1-${{ needs.detect-changes.outputs.v1_version }}" "UltimateSensor Mini V1 ${{ needs.detect-changes.outputs.v1_version }}"
          fi

          if [[ "${{ needs.detect-changes.outputs.beta_changed }}" == "true" && ! "${{ needs.detect-changes.outputs.beta_version }}" =~ ^dev- ]]; then
            create_release "beta-ultimatesensor-mini-v1-${{ needs.detect-changes.outputs.beta_version }}" "UltimateSensor Mini Beta V1 ${{ needs.detect-changes.outputs.beta_version }}"
          fi

          if [[ "${{ needs.detect-changes.outputs.v2_changed }}" == "true" && ! "${{ needs.detect-changes.outputs.v2_version }}" =~ ^dev- ]]; then
            create_release "ultimatesensor-mini-v2-${{ needs.detect-changes.outputs.v2_version }}" "UltimateSensor Mini V2 ${{ needs.detect-changes.outputs.v2_version }}"
          fi
