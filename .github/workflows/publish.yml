      needs.publish-ultimatesensor-mini-v2-wifi-complete-cloud.result != 'failure' &&
      needs.publish-ultimatesensor-mini-v2-wifi-complete-cloud.result != 'cancelled' &&
      needs.publish-ultimatesensor-mini-v2-ethernet-basic-cloud.result != 'failure' &&
      needs.publish-ultimatesensor-mini-v2-ethernet-basic-cloud.result != 'cancelled' &&
      needs.publish-ultimatesensor-mini-v2-ethernet-complete-cloud.result != 'failure' &&
      needs.publish-ultimatesensor-mini-v2-ethernet-complete-cloud.result != 'cancelled' &&
      needs.publish-ultimatesensor-mini-v2-wifi-basic-ld2460-cloud.result != 'failure' &&
      needs.publish-ultimatesensor-mini-v2-wifi-basic-ld2460-cloud.result != 'cancelled' &&
      needs.publish-ultimatesensor-mini-v2-wifi-complete-ld2460-cloud.result != 'failure' &&
      needs.publish-ultimatesensor-mini-v2-wifi-complete-ld2460-cloud.result != 'cancelled' &&
