      - publish-ultimatesensor-mini-v2-ethernet-basic
      - publish-ultimatesensor-mini-v2-ethernet-complete
      - publish-ultimatesensor-mini-v2-wifi-basic-ld2460
      - publish-ultimatesensor-mini-v2-wifi-complete-ld2460
      - publish-ultimatesensor-mini-v2-ethernet-basic-ld2460
