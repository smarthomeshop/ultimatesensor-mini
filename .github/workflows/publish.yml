name: Build and Publish UltimateSensor Mini firmware

on:
  pull_request:
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force build all variants'
        required: false
        type: boolean
        default: false
  # Scheduled build: rebuild all firmware monthly with latest ESPHome.
  # ESPHome releases new versions around the 15th; the 20th gives early bugfixes time to land.
  schedule:
    - cron: '0 3 20 * *'
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'
      - '.github/workflows/**'
      - 'ultimatesensor-mini-v1/**'
      - 'ultimatesensor-mini-v2/**'

permissions:
  contents: write

jobs:
  validate-changelog:
    name: Validate changelog updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Require changelog update for firmware changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" && "${{ github.event_name }}" != "push" ]]; then
            echo "Event does not require changelog validation"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "push" && "${{ github.actor }}" == "github-actions[bot]" ]]; then
            echo "Skipping changelog validation for GitHub Actions version bump commit"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
          fi

          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "First push detected; skipping changelog validation"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          if ! echo "$CHANGED_FILES" | grep -Eq '^ultimatesensor-mini-v[12]/.*\.ya?ml$'; then
            echo "No firmware YAML changes detected; changelog update not required"
            exit 0
          fi

          if echo "$CHANGED_FILES" | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md updated"
            exit 0
          fi

          echo "::error file=CHANGELOG.md::Firmware YAML changes require a customer-facing CHANGELOG.md update."
          exit 1

  detect-changes:
    name: Detect changed versions
    needs: [validate-changelog]
    runs-on: ubuntu-latest
    outputs:
      v1_changed: ${{ steps.changes.outputs.v1 }}
      v1_build: ${{ steps.changes.outputs.v1_build }}
      beta_changed: ${{ steps.changes.outputs.beta }}
      beta_build: ${{ steps.changes.outputs.beta_build }}
      v2_changed: ${{ steps.changes.outputs.v2 }}
      v2_build: ${{ steps.changes.outputs.v2_build }}
      v1_version: ${{ steps.versions.outputs.v1_version }}
      beta_version: ${{ steps.versions.outputs.beta_version }}
      v2_version: ${{ steps.versions.outputs.v2_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes in each version
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_all }}" == "true" ]]; then
            echo "Force building all variants"
            echo "v1=true" >> "$GITHUB_OUTPUT"
            echo "v1_build=true" >> "$GITHUB_OUTPUT"
            echo "beta=true" >> "$GITHUB_OUTPUT"
            echo "beta_build=true" >> "$GITHUB_OUTPUT"
            echo "v2=true" >> "$GITHUB_OUTPUT"
            echo "v2_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "Scheduled build - rebuilding all variants with latest ESPHome"
            echo "v1=true" >> "$GITHUB_OUTPUT"
            echo "v1_build=true" >> "$GITHUB_OUTPUT"
            echo "beta=true" >> "$GITHUB_OUTPUT"
            echo "beta_build=true" >> "$GITHUB_OUTPUT"
            echo "v2=true" >> "$GITHUB_OUTPUT"
            echo "v2_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "Tag detected, building all variants"
            echo "v1=true" >> "$GITHUB_OUTPUT"
            echo "v1_build=true" >> "$GITHUB_OUTPUT"
            echo "beta=true" >> "$GITHUB_OUTPUT"
            echo "beta_build=true" >> "$GITHUB_OUTPUT"
            echo "v2=true" >> "$GITHUB_OUTPUT"
            echo "v2_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
          fi

          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "First push detected, building all variants"
            echo "v1=true" >> "$GITHUB_OUTPUT"
            echo "v1_build=true" >> "$GITHUB_OUTPUT"
            echo "beta=true" >> "$GITHUB_OUTPUT"
            echo "beta_build=true" >> "$GITHUB_OUTPUT"
            echo "v2=true" >> "$GITHUB_OUTPUT"
            echo "v2_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          V1_CHANGED=$(echo "$CHANGED_FILES" | grep -Eq '^ultimatesensor-mini-v1/(ultimatesensor-mini-(basic|complete)(-cloud)?|ultimatesensor-mini-common|sps30|cloud|cloud-pm)\.ya?ml$' && echo "true" || echo "false")
          BETA_CHANGED=$(echo "$CHANGED_FILES" | grep -Eq '^ultimatesensor-mini-v1/beta-ultimatesensor-mini-(basic|complete|common)\.ya?ml$' && echo "true" || echo "false")
          V2_CHANGED=$(echo "$CHANGED_FILES" | grep -Eq '^ultimatesensor-mini-v2/.*\.ya?ml$' && echo "true" || echo "false")
          WORKFLOW_CHANGED=$(echo "$CHANGED_FILES" | grep -q '^.github/workflows/' && echo "true" || echo "false")

          if [[ "$WORKFLOW_CHANGED" == "true" && "$V1_CHANGED" == "false" && "$BETA_CHANGED" == "false" && "$V2_CHANGED" == "false" ]]; then
            echo "Workflow-only changes detected, rebuilding all variants without creating a new firmware version"
            echo "v1=false" >> "$GITHUB_OUTPUT"
            echo "v1_build=true" >> "$GITHUB_OUTPUT"
            echo "beta=false" >> "$GITHUB_OUTPUT"
            echo "beta_build=true" >> "$GITHUB_OUTPUT"
            echo "v2=false" >> "$GITHUB_OUTPUT"
            echo "v2_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "v1=$V1_CHANGED" >> "$GITHUB_OUTPUT"
          echo "v1_build=$V1_CHANGED" >> "$GITHUB_OUTPUT"
          echo "beta=$BETA_CHANGED" >> "$GITHUB_OUTPUT"
          echo "beta_build=$BETA_CHANGED" >> "$GITHUB_OUTPUT"
          echo "v2=$V2_CHANGED" >> "$GITHUB_OUTPUT"
          echo "v2_build=$V2_CHANGED" >> "$GITHUB_OUTPUT"
          echo "V1 changed: $V1_CHANGED"
          echo "Beta changed: $BETA_CHANGED"
          echo "V2 changed: $V2_CHANGED"

      - name: Update version numbers for changed versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          IS_SCHEDULED="${{ github.event_name == 'schedule' }}"
          VERSION_FILE="ultimatesensor-mini-v1/ultimatesensor-mini-common.yaml"
          BETA_VERSION_FILE="ultimatesensor-mini-v1/beta-ultimatesensor-mini-common.yaml"
          V2_VERSION_FILE="ultimatesensor-mini-v2/base.yaml"

          git fetch --tags --force >/dev/null 2>&1 || true

          update_version() {
            local current_version

            current_version=$(grep "project_version:" "$VERSION_FILE" | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
            echo "Current version for $VERSION_FILE: $current_version"

            if [[ "$IS_SCHEDULED" == "true" ]]; then
              echo "v1_version=${current_version}" >> "$GITHUB_OUTPUT"
              echo "Scheduled build - keeping version: $current_version"
              return
            fi

            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "v1_version=${current_version}" >> "$GITHUB_OUTPUT"
              echo "Tag build - keeping version: $current_version"
              return
            fi

            if [[ "$current_version" =~ ^([0-9]+)\.([0-9]+)(.*)$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              SUFFIX="${BASH_REMATCH[3]}"
              NEW_MINOR=$((MINOR + 1))
              NEW_VERSION="${MAJOR}.${NEW_MINOR}${SUFFIX}"
            else
              SHORTSHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
              NEW_VERSION="dev-${SHORTSHA}"
            fi

            echo "v1_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "New version for $VERSION_FILE: $NEW_VERSION"
          }

          if [[ "${{ steps.changes.outputs.v1 }}" == "true" ]]; then
            update_version
          else
            V1_CURRENT=$(grep "project_version:" "$VERSION_FILE" 2>/dev/null | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/' || echo "1.0")
            echo "v1_version=$V1_CURRENT" >> "$GITHUB_OUTPUT"
          fi

          BETA_CURRENT=$(grep "project_version:" "$BETA_VERSION_FILE" 2>/dev/null | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/' || echo "${V1_CURRENT:-1.0}-beta")
          if [[ "$IS_SCHEDULED" == "true" ]]; then
            BETA_VERSION="$BETA_CURRENT"
          elif [[ "${{ steps.changes.outputs.beta }}" == "true" || "${{ steps.changes.outputs.beta_build }}" == "true" ]]; then
            if [[ "$BETA_CURRENT" =~ ^([0-9]+)\.([0-9]+)(.*)$ ]]; then
              BETA_VERSION="${BASH_REMATCH[1]}.$((BASH_REMATCH[2] + 1))-beta.${{ github.run_number }}"
            else
              BETA_VERSION="${V1_CURRENT:-1.0}-beta.${{ github.run_number }}"
            fi
          else
            BETA_VERSION="$BETA_CURRENT"
          fi
          echo "beta_version=$BETA_VERSION" >> "$GITHUB_OUTPUT"
          echo "Beta version: $BETA_VERSION"

          V2_CURRENT=$(grep "ultimatesensor_mini_software_version:" "$V2_VERSION_FILE" 2>/dev/null | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/' || echo "1.0")
          if [[ "$IS_SCHEDULED" == "true" || "${GITHUB_REF_TYPE}" == "tag" || "${{ steps.changes.outputs.v2 }}" != "true" ]]; then
            V2_VERSION="$V2_CURRENT"
          elif ! git rev-parse -q --verify "refs/tags/ultimatesensor-mini-v2-${V2_CURRENT}" >/dev/null; then
            V2_VERSION="$V2_CURRENT"
            echo "No release tag found for ultimatesensor-mini-v2-${V2_CURRENT} - keeping version: $V2_VERSION"
          elif [[ "$V2_CURRENT" =~ ^([0-9]+)\.([0-9]+)(.*)$ ]]; then
            V2_VERSION="${BASH_REMATCH[1]}.$((BASH_REMATCH[2] + 1))${BASH_REMATCH[3]}"
          else
            SHORTSHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
            V2_VERSION="dev-${SHORTSHA}"
          fi
          echo "v2_version=$V2_VERSION" >> "$GITHUB_OUTPUT"
          echo "V2 version: $V2_VERSION"

      - name: Commit version updates and create tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          finalize_changelog() {
            local unreleased_notes
            local release_blocks
            local release_date

            unreleased_notes=$(mktemp)
            release_blocks=$(mktemp)
            release_date=$(TZ=Europe/Amsterdam date +%Y-%m-%d)

            awk '
              $0 == "## [Unreleased]" { found=1; next }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md \
              | sed '/^- Add customer-facing firmware notes here before merging a PR\.$/d' \
              > "$unreleased_notes"

            if ! grep -q '[^[:space:]]' "$unreleased_notes"; then
              echo "No unreleased changelog notes to finalize"
              rm -f "$unreleased_notes" "$release_blocks"
              return
            fi

            if [[ "${{ steps.changes.outputs.v1 }}" == "true" ]]; then
              {
                printf '## [UltimateSensor Mini V1 %s] - %s\n\n' "${{ steps.versions.outputs.v1_version }}" "$release_date"
                cat "$unreleased_notes"
                printf '\n'
              } >> "$release_blocks"
            fi

            if [[ "${{ steps.changes.outputs.beta }}" == "true" ]]; then
              {
                printf '## [UltimateSensor Mini Beta V1 %s] - %s\n\n' "${{ steps.versions.outputs.beta_version }}" "$release_date"
                cat "$unreleased_notes"
                printf '\n'
              } >> "$release_blocks"
            fi

            if [[ "${{ steps.changes.outputs.v2 }}" == "true" ]]; then
              {
                printf '## [UltimateSensor Mini V2 %s] - %s\n\n' "${{ steps.versions.outputs.v2_version }}" "$release_date"
                cat "$unreleased_notes"
                printf '\n'
              } >> "$release_blocks"
            fi

            awk -v blocks_file="$release_blocks" '
              BEGIN { in_unreleased=0 }
              $0 == "## [Unreleased]" {
                print
                print ""
                print "- Add customer-facing firmware notes here before merging a PR."
                print ""
                while ((getline line < blocks_file) > 0) {
                  print line
                }
                in_unreleased=1
                next
              }
              in_unreleased && /^## \[/ {
                in_unreleased=0
                print
                next
              }
              in_unreleased { next }
              { print }
            ' CHANGELOG.md > CHANGELOG.md.tmp

            mv CHANGELOG.md.tmp CHANGELOG.md
            rm -f "$unreleased_notes" "$release_blocks"
          }

          create_tag() {
            local TAG_NAME=$1

            if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              echo "Tag $TAG_NAME already exists, skipping"
              return
            fi

            echo "Creating tag: $TAG_NAME"
            git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
            git push origin "$TAG_NAME"
            echo "Tag $TAG_NAME created and pushed"
          }

          if [[ "${{ steps.changes.outputs.v1 }}" == "true" ]]; then
            sed -i "s/^\s*project_version: \".*\"/  project_version: \"${{ steps.versions.outputs.v1_version }}\"/" ultimatesensor-mini-v1/ultimatesensor-mini-common.yaml
          fi

          if [[ "${{ steps.changes.outputs.beta }}" == "true" ]]; then
            sed -i "s/^\s*project_version: \".*\"/  project_version: \"${{ steps.versions.outputs.beta_version }}\"/" ultimatesensor-mini-v1/beta-ultimatesensor-mini-common.yaml
          fi

          if [[ "${{ steps.changes.outputs.v2 }}" == "true" ]]; then
            sed -i "s/^\s*ultimatesensor_mini_software_version: \".*\"/  ultimatesensor_mini_software_version: \"${{ steps.versions.outputs.v2_version }}\"/" ultimatesensor-mini-v2/base.yaml
          fi

          if [[ "${{ steps.changes.outputs.v1 }}" == "true" || "${{ steps.changes.outputs.beta }}" == "true" || "${{ steps.changes.outputs.v2 }}" == "true" ]]; then
            finalize_changelog
          fi

          if [[ "${{ steps.changes.outputs.v1 }}" == "true" || "${{ steps.changes.outputs.beta }}" == "true" || "${{ steps.changes.outputs.v2 }}" == "true" ]] && ! git diff --quiet; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add CHANGELOG.md ultimatesensor-mini-v1/ultimatesensor-mini-common.yaml ultimatesensor-mini-v1/beta-ultimatesensor-mini-common.yaml ultimatesensor-mini-v2/base.yaml

            MSG="chore: update versions"
            [[ "${{ steps.changes.outputs.v1 }}" == "true" ]] && MSG="$MSG V1=${{ steps.versions.outputs.v1_version }}"
            [[ "${{ steps.changes.outputs.beta }}" == "true" ]] && MSG="$MSG Beta=${{ steps.versions.outputs.beta_version }}"
            [[ "${{ steps.changes.outputs.v2 }}" == "true" ]] && MSG="$MSG V2=${{ steps.versions.outputs.v2_version }}"
            MSG="$MSG [skip ci]"

            git commit -m "$MSG" || exit 0
            git push || echo "Nothing to push"

            if [[ ! "${{ steps.versions.outputs.v1_version }}" =~ ^dev- ]]; then
              if [[ "${{ steps.changes.outputs.v1 }}" == "true" ]]; then
                create_tag "ultimatesensor-mini-v1-${{ steps.versions.outputs.v1_version }}"
              fi
            fi

            if [[ ! "${{ steps.versions.outputs.beta_version }}" =~ ^dev- ]]; then
              if [[ "${{ steps.changes.outputs.beta }}" == "true" ]]; then
                create_tag "beta-ultimatesensor-mini-v1-${{ steps.versions.outputs.beta_version }}"
              fi
            fi

            if [[ ! "${{ steps.versions.outputs.v2_version }}" =~ ^dev- ]]; then
              if [[ "${{ steps.changes.outputs.v2 }}" == "true" ]]; then
                create_tag "ultimatesensor-mini-v2-${{ steps.versions.outputs.v2_version }}"
              fi
            fi
          fi

          # Create a release tag even when the current version was deliberately
          # kept (for example after recovering a deleted release tag).
          if [[ "${{ steps.changes.outputs.v1 }}" == "true" && ! "${{ steps.versions.outputs.v1_version }}" =~ ^dev- ]]; then
            create_tag "ultimatesensor-mini-v1-${{ steps.versions.outputs.v1_version }}"
          fi
          if [[ "${{ steps.changes.outputs.beta }}" == "true" && ! "${{ steps.versions.outputs.beta_version }}" =~ ^dev- ]]; then
            create_tag "beta-ultimatesensor-mini-v1-${{ steps.versions.outputs.beta_version }}"
          fi
          if [[ "${{ steps.changes.outputs.v2 }}" == "true" && ! "${{ steps.versions.outputs.v2_version }}" =~ ^dev- ]]; then
            create_tag "ultimatesensor-mini-v2-${{ steps.versions.outputs.v2_version }}"
          fi

  publish-ultimatesensor-mini-basic:
    name: Publish UltimateSensor Mini Basic
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v1_build == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: ultimatesensor-mini-v1/ultimatesensor-mini-basic.yaml
      name: UltimateSensor Mini Basic
      manifest_filename: ultimatesensor-mini-basic-manifest.json
      clean: false
      esphome_version: latest
      directory_name: ultimatesensor-mini-basic
      project_version: ${{ needs.detect-changes.outputs.v1_version }}
      base_path: ultimatesensor-mini-v1

  publish-ultimatesensor-mini-complete:
    name: Publish UltimateSensor Mini Complete
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v1_build == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: ultimatesensor-mini-v1/ultimatesensor-mini-complete.yaml
      name: UltimateSensor Mini Complete
      manifest_filename: ultimatesensor-mini-complete-manifest.json
      clean: false
      esphome_version: latest
      directory_name: ultimatesensor-mini-complete
      project_version: ${{ needs.detect-changes.outputs.v1_version }}
      base_path: ultimatesensor-mini-v1

  publish-ultimatesensor-mini-basic-cloud:
    name: Publish UltimateSensor Mini Basic Cloud
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v1_build == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: ultimatesensor-mini-v1/ultimatesensor-mini-basic-cloud.yaml
      name: UltimateSensor Mini Basic Cloud
      manifest_filename: ultimatesensor-mini-basic-cloud-manifest.json
      clean: false
      esphome_version: latest
      directory_name: ultimatesensor-mini-basic-cloud
      project_version: ${{ needs.detect-changes.outputs.v1_version }}
      base_path: ultimatesensor-mini-v1

  publish-ultimatesensor-mini-complete-cloud:
    name: Publish UltimateSensor Mini Complete Cloud
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v1_build == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: ultimatesensor-mini-v1/ultimatesensor-mini-complete-cloud.yaml
      name: UltimateSensor Mini Complete Cloud
      manifest_filename: ultimatesensor-mini-complete-cloud-manifest.json
      clean: false
      esphome_version: latest
      directory_name: ultimatesensor-mini-complete-cloud
      project_version: ${{ needs.detect-changes.outputs.v1_version }}
      base_path: ultimatesensor-mini-v1

  publish-ultimatesensor-mini-beta-basic:
    name: Publish UltimateSensor Mini Beta Basic
    needs: [detect-changes]
    if: needs.detect-changes.outputs.beta_build == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: ultimatesensor-mini-v1/beta-ultimatesensor-mini-basic.yaml
      name: UltimateSensor Mini Beta Basic
      manifest_filename: beta-ultimatesensor-mini-basic-manifest.json
      clean: false
      esphome_version: latest
      directory_name: beta-ultimatesensor-mini-basic
      project_version: ${{ needs.detect-changes.outputs.beta_version }}
      base_path: ultimatesensor-mini-v1
      version_file: beta-ultimatesensor-mini-common.yaml

  publish-ultimatesensor-mini-beta-complete:
    name: Publish UltimateSensor Mini Beta Complete
    needs: [detect-changes]
    if: needs.detect-changes.outputs.beta_build == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: ultimatesensor-mini-v1/beta-ultimatesensor-mini-complete.yaml
      name: UltimateSensor Mini Beta Complete
      manifest_filename: beta-ultimatesensor-mini-complete-manifest.json
      clean: false
      esphome_version: latest
      directory_name: beta-ultimatesensor-mini-complete
      project_version: ${{ needs.detect-changes.outputs.beta_version }}
      base_path: ultimatesensor-mini-v1
      version_file: beta-ultimatesensor-mini-common.yaml

  publish-ultimatesensor-mini-v2-wifi-basic:
    name: Publish UltimateSensor Mini V2 WiFi Basic
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v2_build == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: ultimatesensor-mini-v2/ultimatesensor-mini-v2-wifi-basic.yaml
      name: UltimateSensor Mini V2 WiFi Basic
      manifest_filename: ultimatesensor-mini-v2-wifi-basic-manifest.json
      clean: false
      esphome_version: latest
      directory_name: ultimatesensor-mini-v2-wifi-basic
      project_version: ${{ needs.detect-changes.outputs.v2_version }}
      base_path: ultimatesensor-mini-v2
      version_file: base.yaml
      version_key: ultimatesensor_mini_software_version

  publish-ultimatesensor-mini-v2-wifi-complete:
    name: Publish UltimateSensor Mini V2 WiFi Complete
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v2_build == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: ultimatesensor-mini-v2/ultimatesensor-mini-v2-wifi-complete.yaml
      name: UltimateSensor Mini V2 WiFi Complete
      manifest_filename: ultimatesensor-mini-v2-wifi-complete-manifest.json
      clean: false
      esphome_version: latest
      directory_name: ultimatesensor-mini-v2-wifi-complete
      project_version: ${{ needs.detect-changes.outputs.v2_version }}
      base_path: ultimatesensor-mini-v2
      version_file: base.yaml
      version_key: ultimatesensor_mini_software_version

  publish-ultimatesensor-mini-v2-ethernet-basic:
    name: Publish UltimateSensor Mini V2 Ethernet Basic
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v2_build == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: ultimatesensor-mini-v2/ultimatesensor-mini-v2-ethernet-basic.yaml
      name: UltimateSensor Mini V2 Ethernet Basic
      manifest_filename: ultimatesensor-mini-v2-ethernet-basic-manifest.json
      clean: false
      esphome_version: latest
      directory_name: ultimatesensor-mini-v2-ethernet-basic
      project_version: ${{ needs.detect-changes.outputs.v2_version }}
      base_path: ultimatesensor-mini-v2
      version_file: base.yaml
      version_key: ultimatesensor_mini_software_version

  publish-ultimatesensor-mini-v2-ethernet-complete:
    name: Publish UltimateSensor Mini V2 Ethernet Complete
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v2_build == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: ultimatesensor-mini-v2/ultimatesensor-mini-v2-ethernet-complete.yaml
      name: UltimateSensor Mini V2 Ethernet Complete
