      needs.publish-ultimatesensor-mini-beta-basic.result != 'failure' &&
      needs.publish-ultimatesensor-mini-beta-basic.result != 'cancelled' &&
      needs.publish-ultimatesensor-mini-beta-complete.result != 'failure' &&
      needs.publish-ultimatesensor-mini-beta-complete.result != 'cancelled' &&
      needs.publish-ultimatesensor-mini-v2-wifi-basic.result != 'failure' &&
      needs.publish-ultimatesensor-mini-v2-wifi-basic.result != 'cancelled' &&
      needs.publish-ultimatesensor-mini-v2-wifi-complete.result != 'failure' &&
      needs.publish-ultimatesensor-mini-v2-wifi-complete.result != 'cancelled' &&
      needs.publish-ultimatesensor-mini-v2-ethernet-basic.result != 'failure' &&
      needs.publish-ultimatesensor-mini-v2-ethernet-basic.result != 'cancelled' &&
      needs.publish-ultimatesensor-mini-v2-ethernet-complete.result != 'failure' &&
